server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_talent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:111111}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.talent.entity
  configuration:
    map-underscore-to-camel-case: true   # ?????????? created_at ? createdAt
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # ?????SQL?????????

logging:
  level:
    com.campus.talent: debug

jwt:
  secret: campus-talent-secret-key-2024-very-long-string
  expiration: 86400000  # 24???????

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true